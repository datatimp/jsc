<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSC Pair Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="container">
        <header>
            <p class="subtitle">Never Search Alone</p>
            <h1>JSC Pair Generator</h1>
        </header>
        
        <div id="roster-container" class="roster"></div>

        <div class="controls">
            <button id="generate-btn" class="btn">
                <span class="btn-text">Generate Pairs</span>
                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            </button>
        </div>

        <div id="results-container" class="results">
            <div class="empty-state">
                <p>Click the button above to generate random pairs!</p>
            </div>
        </div>

        <section class="links-section">
            <h2>Links</h2>
            <div id="links-container" class="links-container">
                <!-- Markdown will be rendered here -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
